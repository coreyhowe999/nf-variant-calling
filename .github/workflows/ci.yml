name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Nextflow config lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Nextflow
        uses: nf-core/setup-nextflow@v2
        with:
          version: "23.10.1"

      - name: Validate nextflow.config
        run: nextflow config -profile test ./main.nf > /dev/null

  test:
    name: End-to-end test profile
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Install Nextflow
        uses: nf-core/setup-nextflow@v2
        with:
          version: "23.10.1"

      - name: Run pipeline (test, docker)
        run: |
          nextflow run main.nf \
            -profile test,docker \
            --outdir test_results \
            -ansi-log false

      - name: Assert MultiQC report exists
        run: |
          test -s test_results/multiqc/multiqc_report.html \
            && echo "MultiQC report produced." \
            || (echo "Missing MultiQC report"; exit 1)

      - name: Assert VCFs exist
        run: |
          shopt -s nullglob
          vcfs=(test_results/bcftools/*.vcf.gz)
          if [ ${#vcfs[@]} -eq 0 ]; then
            echo "No VCFs produced"; exit 1
          fi
          echo "Produced ${#vcfs[@]} VCF(s):"
          printf ' - %s\n' "${vcfs[@]}"

      - name: Upload outputs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: nf-variant-calling-test-outputs
          path: |
            test_results/
            .nextflow.log
          retention-days: 7
